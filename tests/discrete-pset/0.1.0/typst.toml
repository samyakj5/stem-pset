# for a description of available keys, see https://github.com/typst/packages/?tab=readme-ov-file#package-format

[package]
name = "stem-pset"
version = "0.1.0"
entrypoint = "src/lib.typ"
authors = ["Samyak Jain <samyakj5@illinois.edu>"]
license = "Unlicense"
description = "A modular problem set template for STEM coursework."
repository = "https://github.com/samyakj5/stem-pset"
keywords = ["pset", "homework", "stem", "STEM"]
categories = ["report"]
# compiler = ""
exclude = [
  ".github",
  "docs",
  "scripts",
  "tests",
  ".typstignore",
  "Justfile",
  "thumbnail-dark.svg",
  "thumbnail-light.svg",
]

